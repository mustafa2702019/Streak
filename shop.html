<!DOCTYPE html>
<html lang="en" x-data="shopApp()" :dir="language === 'ar' ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Streak egy</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@400;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        bebas: ['Bebas Neue', 'sans-serif'],
                        cairo: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FFD700',
                        dark: '#1a1a1a',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .btn-yellow {
                @apply bg-primary text-black font-bold py-3.5 px-10 rounded-full hover:bg-black hover:text-white transition-all duration-300 flex items-center justify-center shadow-lg;
            }
            .nav-link {
                @apply text-sm font-semibold uppercase tracking-widest transition-colors duration-300;
            }
        }
        [x-cloak] { display: none !important; }
        [dir="rtl"] { font-family: 'Cairo', sans-serif; }
        svg { display: inline-block; vertical-align: middle; }
    </style>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-white text-dark font-sans overflow-x-hidden pt-28">
    
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-xl py-3 border-b border-gray-100 shadow-sm text-dark">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <!-- Premium Logo -->
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="relative">
                    <div class="w-12 h-12 bg-white border-2 border-primary rounded-2xl flex items-center justify-center shadow-sm group-hover:bg-primary transition-all duration-500 overflow-hidden">
                        <img src="logo.png" class="w-9 h-9 object-contain group-hover:scale-110 transition-transform">
                    </div>
                    <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-white rounded-full flex items-center justify-center shadow-sm border border-gray-100">
                        <i data-lucide="zap" class="w-3 h-3 text-primary fill-primary"></i>
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-2xl font-bebas tracking-wider leading-none">STREAK <span class="text-primary">EGY</span></span>
                    <span class="text-[8px] uppercase tracking-[0.3em] font-bold text-gray-400">Elite Performance</span>
                </div>
            </a>

            <div class="hidden lg:flex items-center gap-10">
                <a href="index.html" class="nav-link hover:text-primary" x-text="brandConfig.ui.home[language]"></a>
                <a href="shop.html" class="nav-link text-primary" x-text="brandConfig.ui.shop[language]"></a>
                <a href="about.html" class="nav-link hover:text-primary" x-text="brandConfig.ui.about[language]"></a>
                <a href="contact.html" class="nav-link hover:text-primary" x-text="brandConfig.ui.contact[language]"></a>
            </div>

            <div class="flex items-center gap-4">
                <button @click="toggleLanguage()" class="w-11 h-11 rounded-full border border-gray-200 flex items-center justify-center hover:bg-primary transition-all">
                    <span class="text-xs font-bold" x-text="language === 'en' ? 'AR' : 'EN'"></span>
                </button>
                <button @click="cartOpen = true" class="relative w-11 h-11 rounded-full border border-gray-200 flex items-center justify-center hover:bg-primary transition-all">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                    <span x-show="cartCount > 0" x-text="cartCount" class="absolute -top-1 -right-1 w-5 h-5 bg-primary text-black text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white"></span>
                </button>
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden w-11 h-11 rounded-full border border-gray-200 flex items-center justify-center">
                    <i data-lucide="menu" x-show="!mobileMenuOpen" class="w-5 h-5"></i>
                    <i data-lucide="x" x-show="mobileMenuOpen" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div x-show="mobileMenuOpen" x-cloak class="lg:hidden bg-white border-t">
            <div class="p-6 space-y-4">
                <a href="index.html" class="flex items-center justify-between p-4 rounded-2xl hover:bg-gray-50 font-bold text-xl transition-colors">
                    <span x-text="brandConfig.ui.home[language]"></span>
                    <i data-lucide="home" class="w-5 h-5"></i>
                </a>
                <a href="shop.html" class="flex items-center justify-between p-4 rounded-2xl bg-gray-50 text-primary font-bold text-xl">
                    <span x-text="brandConfig.ui.shop[language]"></span>
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                </a>
                <a href="about.html" class="flex items-center justify-between p-4 rounded-2xl hover:bg-gray-50 font-bold text-xl transition-colors">
                    <span x-text="brandConfig.ui.about[language]"></span>
                    <i data-lucide="info" class="w-5 h-5"></i>
                </a>
                <a href="contact.html" class="flex items-center justify-between p-4 rounded-2xl hover:bg-gray-50 font-bold text-xl transition-colors">
                    <span x-text="brandConfig.ui.contact[language]"></span>
                    <i data-lucide="phone" class="w-5 h-5"></i>
                </a>
            </div>
            <!-- Socials in Mobile Menu -->
            <div class="p-8 bg-gray-50 flex justify-center gap-8">
                <a :href="brandConfig.social.instagram" target="_blank" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm"><i data-lucide="instagram" class="w-6 h-6"></i></a>
                <a :href="'https://wa.me/' + brandConfig.whatsappNumber" target="_blank" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm"><i data-lucide="message-circle" class="w-6 h-6 text-green-500"></i></a>
                <a :href="brandConfig.social.facebook" target="_blank" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm"><i data-lucide="facebook" class="w-6 h-6 text-blue-600"></i></a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
        <div class="mb-16">
            <h1 class="text-5xl lg:text-7xl font-bold text-dark mb-6" x-text="brandConfig.ui.shop[language]"></h1>
            <p class="text-xl text-gray-500 max-w-2xl" x-text="language === 'ar' ? 'اكتشف مجموعتنا من الملابس الرياضية المتميزة.' : 'Discover our collection of premium athletic wear.'"></p>
        </div>

        <!-- Search & Filter -->
        <div class="flex flex-col lg:flex-row gap-6 mb-16">
            <div class="relative flex-1 group">
                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 text-gray-400"></i>
                <input type="text" x-model="searchQuery" :placeholder="brandConfig.ui.search[language]" class="w-full pl-14 pr-6 py-5 bg-gray-50 border border-gray-100 rounded-[2rem] focus:outline-none focus:border-primary transition-all text-lg shadow-sm">
            </div>
            <div class="flex flex-wrap gap-3">
                <button @click="activeCategory = 'all'" :class="activeCategory === 'all' ? 'bg-dark text-white' : 'bg-gray-100 text-gray-600'" class="px-8 py-5 rounded-[2rem] text-sm font-bold uppercase tracking-widest transition-all" x-text="brandConfig.ui.all_products[language]"></button>
                <template x-for="cat in categories" :key="cat.id">
                    <button @click="activeCategory = cat.id" :class="activeCategory === cat.id ? 'bg-dark text-white' : 'bg-gray-100 text-gray-600'" class="px-8 py-5 rounded-[2rem] text-sm font-bold uppercase tracking-widest transition-all" x-text="language === 'ar' ? cat.labelAr : cat.label"></button>
                </template>
            </div>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <template x-for="product in filteredProducts()" :key="product.id">
                <div class="bg-white rounded-[2rem] overflow-hidden border border-gray-100 shadow-sm hover:shadow-2xl transition-all duration-500 cursor-pointer" @click="openQuickView(product)">
                    <div class="relative aspect-[4/5] overflow-hidden">
                        <img :src="product.image" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110">
                    </div>
                    <div class="p-8">
                        <h3 class="font-bold text-xl text-dark truncate mb-2" x-text="language === 'ar' ? product.nameAr : product.name"></h3>
                        <div class="flex items-center justify-between">
                            <p class="text-2xl font-bebas tracking-wider text-dark" x-text="product.priceLabel"></p>
                            <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center shadow-md"><i data-lucide="plus" class="w-5 h-5 text-black"></i></div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white pt-20 pb-10">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <div class="bg-white rounded-2xl p-4 inline-block mb-8 shadow-xl">
                <img src="logo.png" class="h-16 w-auto object-contain">
            </div>
            <div class="flex justify-center gap-6 mb-10">
                <a :href="brandConfig.social.instagram" target="_blank" class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center hover:bg-primary hover:text-black transition-all group shadow-lg">
                    <i data-lucide="instagram" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                </a>
                <a :href="'https://wa.me/' + brandConfig.whatsappNumber" target="_blank" class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center hover:bg-primary hover:text-black transition-all group shadow-lg">
                    <i data-lucide="message-circle" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                </a>
                <a :href="brandConfig.social.facebook" target="_blank" class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center hover:bg-primary hover:text-black transition-all group shadow-lg">
                    <i data-lucide="facebook" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                </a>
                <a :href="brandConfig.social.youtube" target="_blank" class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center hover:bg-primary hover:text-black transition-all group shadow-lg">
                    <i data-lucide="youtube" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                </a>
            </div>
            <p class="text-gray-500 text-xs uppercase tracking-[0.3em]">&copy; 2026 STREAK EGY. All rights reserved.</p>
        </div>
    </footer>

    <!-- Quick View Modal -->
    <div x-show="selectedProduct" class="fixed inset-0 z-[160]" x-cloak>
        <div @click="selectedProduct = null" class="absolute inset-0 bg-black/80 backdrop-blur-md"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-5xl max-h-[90vh] overflow-hidden relative flex flex-col md:flex-row" @click.away="selectedProduct = null">
                <button @click="selectedProduct = null" class="absolute top-6 right-6 z-50 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-xl hover:bg-primary transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
                
                <div class="md:w-1/2 bg-gray-50">
                    <img :src="selectedProduct?.image" class="w-full h-full object-cover">
                </div>
                
                <div class="md:w-1/2 p-10 md:p-16 overflow-y-auto">
                    <h2 class="text-4xl font-bold mb-4 text-dark" x-text="language === 'ar' ? selectedProduct?.nameAr : selectedProduct?.name"></h2>
                    <p class="text-4xl font-bebas tracking-wider text-dark mb-8 border-b border-gray-100 pb-8" x-text="selectedProduct?.priceLabel"></p>
                    <p class="text-gray-500 text-lg leading-relaxed mb-10" x-text="language === 'ar' ? selectedProduct?.descriptionAr : selectedProduct?.description"></p>
                    
                    <div class="space-y-6">
                        <div class="flex gap-3">
                            <template x-for="color in selectedProduct?.colors">
                                <button @click="selectedColor = color" :class="selectedColor === color ? 'bg-dark text-white' : 'bg-gray-100 text-gray-600'" class="px-6 py-3 rounded-2xl text-sm font-bold transition-all" x-text="color"></button>
                            </template>
                        </div>
                        <div class="flex gap-3">
                            <template x-for="size in selectedProduct?.sizes">
                                <button @click="selectedSize = size" :class="selectedSize === size ? 'bg-dark text-white' : 'bg-white border-2'" class="w-14 h-14 rounded-2xl flex items-center justify-center text-sm font-bold transition-all" x-text="size"></button>
                            </template>
                        </div>
                    </div>
                    
                    <div class="mt-12">
                        <button @click="addToCart()" class="w-full btn-yellow h-20 text-xl uppercase tracking-widest font-bebas" x-text="brandConfig.ui.add_to_cart[language]"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div x-show="cartOpen" x-cloak class="fixed inset-0 z-[150]">
        <div @click="cartOpen = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="absolute inset-y-0 right-0 max-w-md w-full bg-white flex flex-col shadow-2xl">
            <div class="p-8 border-b flex items-center justify-between bg-dark text-white">
                <h2 class="text-3xl font-bebas tracking-wider" x-text="brandConfig.ui.your_gear[language]"></h2>
                <button @click="cartOpen = false" class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center hover:bg-primary transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-6">
                <template x-for="item in cart">
                    <div class="flex gap-4 p-4 bg-gray-50 rounded-2xl shadow-sm">
                        <img :src="item.image" class="w-20 h-24 object-cover rounded-xl shadow-inner">
                        <div class="flex-1">
                            <h3 class="font-bold" x-text="language === 'ar' ? item.nameAr : item.name"></h3>
                            <p class="text-xs text-gray-400 mt-1" x-text="item.color + ' / ' + item.size"></p>
                            <div class="flex items-center justify-between mt-4">
                                <span class="font-bold text-lg" x-text="'LE ' + (item.price * item.quantity).toLocaleString()"></span>
                                <div class="flex items-center gap-2">
                                    <button @click="updateQuantity(item, -1)" class="w-8 h-8 rounded-lg bg-white border flex items-center justify-center"><i data-lucide="minus" class="w-3 h-3"></i></button>
                                    <span class="font-bold text-sm" x-text="item.quantity"></span>
                                    <button @click="updateQuantity(item, 1)" class="w-8 h-8 rounded-lg bg-white border flex items-center justify-center"><i data-lucide="plus" class="w-3 h-3"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            <div class="p-8 border-t space-y-4">
                <div class="flex justify-between font-bold text-2xl"><span x-text="brandConfig.ui.total[language]"></span><span x-text="'LE ' + cartTotal.toLocaleString()"></span></div>
                <button @click="checkout()" class="w-full btn-yellow h-16 uppercase font-bebas tracking-widest text-xl shadow-xl" x-text="brandConfig.ui.checkout[language]"></button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function shopApp() {
            return {
                language: localStorage.getItem('lang') || 'en',
                cartOpen: false,
                mobileMenuOpen: false,
                cart: JSON.parse(localStorage.getItem('cart') || '[]'),
                brandConfig: brandConfig,
                categories: categories,
                products: products,
                searchQuery: '',
                activeCategory: 'all',
                selectedProduct: null,
                selectedColor: '',
                selectedSize: '',
                init() {
                    this.$watch('cart', val => { localStorage.setItem('cart', JSON.stringify(val)); this.updateLucide(); });
                    this.$watch('language', () => this.updateLucide());
                    this.$watch('mobileMenuOpen', () => this.updateLucide());
                    this.updateLucide();
                },
                filteredProducts() {
                    return this.products.filter(p => {
                        const matchesCat = this.activeCategory === 'all' || p.category === this.activeCategory;
                        const matchesSearch = (this.language === 'ar' ? p.nameAr : p.name).toLowerCase().includes(this.searchQuery.toLowerCase());
                        return matchesCat && matchesSearch;
                    });
                },
                openQuickView(product) {
                    this.selectedProduct = product;
                    this.selectedColor = product.colors[0];
                    this.selectedSize = product.sizes[0];
                    this.updateLucide();
                },
                addToCart() {
                    const item = { ...this.selectedProduct, color: this.selectedColor, size: this.selectedSize, quantity: 1 };
                    const found = this.cart.find(i => i.id === item.id && i.color === item.color && i.size === item.size);
                    if (found) found.quantity++; else this.cart.push(item);
                    this.selectedProduct = null;
                    this.cartOpen = true;
                    this.updateLucide();
                },
                get cartCount() { return this.cart.reduce((sum, i) => sum + i.quantity, 0); },
                get cartTotal() { return this.cart.reduce((sum, i) => sum + (item.price * item.quantity), 0); },
                updateQuantity(item, delta) {
                    const found = this.cart.find(i => i.id === item.id && i.color === item.color && i.size === item.size);
                    if (found) { found.quantity += delta; if (found.quantity <= 0) this.cart = this.cart.filter(i => i !== found); }
                    this.updateLucide();
                },
                checkout() {
                    let msg = `Hi Streak egy! ⚡ I want to order:\n\n`;
                    this.cart.forEach(i => msg += `- ${this.language === 'ar' ? i.nameAr : i.name} (${i.color}, ${i.size}) x${i.quantity}\n`);
                    msg += `\nTotal: LE ${this.cartTotal.toLocaleString()}`;
                    window.open(`https://wa.me/201551137890?text=${encodeURIComponent(msg)}`, '_blank');
                },
                toggleLanguage() { this.language = this.language === 'en' ? 'ar' : 'en'; localStorage.setItem('lang', this.language); },
                updateLucide() { this.$nextTick(() => { if (window.lucide) lucide.createIcons(); }); }
            }
        }
    </script>
</body>
</html>
