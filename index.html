<!DOCTYPE html>
<html lang="en" x-data="mainApp()" :dir="language === 'ar' ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streak egy | Sports Clothing</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@400;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        bebas: ['Bebas Neue', 'sans-serif'],
                        cairo: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FFD700',
                        dark: '#1a1a1a',
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'spin-fast': 'spin 1.5s linear infinite',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .btn-yellow {
                @apply bg-primary text-black font-bold py-3.5 px-10 rounded-full hover:bg-black hover:text-white transition-all duration-300 flex items-center justify-center shadow-lg uppercase tracking-widest;
            }
            .btn-white {
                @apply bg-white/20 backdrop-blur-md border border-white/40 text-white font-bold py-3.5 px-10 rounded-full hover:bg-white hover:text-black transition-all duration-300 flex items-center justify-center uppercase tracking-widest;
            }
            .nav-link {
                @apply text-sm font-semibold uppercase tracking-widest transition-colors duration-300;
            }
        }
        [x-cloak] { display: none !important; }
        [dir="rtl"] { font-family: 'Cairo', sans-serif; }
        
        /* Premium Logo Styling */
        .premium-logo {
            background: white;
            border: 2px solid #FFD700;
            box-shadow: 0 10px 25px -5px rgba(255, 215, 0, 0.2);
        }
    </style>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-white text-dark font-sans overflow-x-hidden">
    
    <!-- Loading Screen -->
    <div x-show="loading" x-cloak x-transition:leave="transition ease-in duration-700" 
         class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center">
        <div class="relative w-32 h-32 flex items-center justify-center">
            <div class="absolute inset-0 border-4 border-primary/10 rounded-full animate-spin-slow"></div>
            <div class="absolute inset-0 border-t-4 border-primary rounded-full animate-spin-fast"></div>
            <img src="logo.png" class="w-20 h-20 object-contain relative z-10">
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-500" 
         :class="scrolled ? 'bg-white/95 backdrop-blur-xl py-3 border-b border-gray-100 text-dark shadow-md' : 'bg-transparent py-6 text-white'">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <!-- Refined Premium Logo -->
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="relative">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 premium-logo rounded-2xl flex items-center justify-center transform group-hover:scale-105 transition-all duration-500 overflow-hidden bg-white">
                        <img src="logo.png" class="w-10 h-10 sm:w-11 sm:h-11 object-contain">
                    </div>
                    <div class="absolute -top-1 -right-1 w-5 h-5 bg-primary rounded-full flex items-center justify-center shadow-md animate-bounce">
                        <i data-lucide="zap" class="w-3 h-3 text-black fill-black"></i>
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-2xl sm:text-3xl font-bebas tracking-wider leading-none">STREAK <span class="text-primary">EGY</span></span>
                    <span class="text-[8px] uppercase tracking-[0.4em] font-bold text-gray-400 group-hover:text-primary transition-colors" x-text="language === 'ar' ? 'أداء متميز' : 'Performance Elite'"></span>
                </div>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center gap-10">
                <a href="index.html" class="nav-link text-primary" x-text="brandConfig.ui.home[language]"></a>
                <a href="shop.html" class="nav-link" x-text="brandConfig.ui.shop[language]"></a>
                <a href="about.html" class="nav-link" x-text="brandConfig.ui.about[language]"></a>
                <a href="contact.html" class="nav-link" x-text="brandConfig.ui.contact[language]"></a>
            </div>

            <div class="flex items-center gap-4">
                <button @click="toggleLanguage()" class="w-11 h-11 rounded-full border flex items-center justify-center hover:bg-primary hover:text-black transition-all" :class="scrolled ? 'border-gray-200' : 'border-white/20'">
                    <span class="text-xs font-bold" x-text="language === 'en' ? 'AR' : 'EN'"></span>
                </button>
                <button @click="cartOpen = true" class="relative w-11 h-11 rounded-full border flex items-center justify-center hover:bg-primary hover:text-black transition-all group" :class="scrolled ? 'border-gray-200' : 'border-white/20'">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                    <span x-show="cartCount > 0" x-text="cartCount" class="absolute -top-1 -right-1 w-5 h-5 bg-primary text-black text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white"></span>
                </button>
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden w-11 h-11 rounded-full border flex items-center justify-center" :class="scrolled ? 'border-gray-200' : 'border-white/20'">
                    <i data-lucide="menu" x-show="!mobileMenuOpen" class="w-5 h-5"></i>
                    <i data-lucide="x" x-show="mobileMenuOpen" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div x-show="mobileMenuOpen" x-cloak class="lg:hidden bg-white text-dark border-t shadow-2xl overflow-hidden">
            <div class="p-6 space-y-4">
                <a href="index.html" class="flex items-center justify-between p-4 rounded-2xl bg-gray-50 text-primary font-bold text-xl"><span x-text="brandConfig.ui.home[language]"></span><i data-lucide="home" class="w-5 h-5 text-primary"></i></a>
                <a href="shop.html" class="flex items-center justify-between p-4 rounded-2xl hover:bg-gray-50 font-bold text-xl transition-colors"><span x-text="brandConfig.ui.shop[language]"></span><i data-lucide="shopping-bag" class="w-5 h-5 text-primary"></i></a>
                <a href="about.html" class="flex items-center justify-between p-4 rounded-2xl hover:bg-gray-50 font-bold text-xl transition-colors"><span x-text="brandConfig.ui.about[language]"></span><i data-lucide="info" class="w-5 h-5 text-primary"></i></a>
                <a href="contact.html" class="flex items-center justify-between p-4 rounded-2xl hover:bg-gray-50 font-bold text-xl transition-colors"><span x-text="brandConfig.ui.contact[language]"></span><i data-lucide="phone" class="w-5 h-5 text-primary"></i></a>
            </div>
            <div class="p-8 bg-gray-50 flex justify-center gap-8">
                <a :href="brandConfig.social.instagram" target="_blank"><i data-lucide="instagram" class="w-6 h-6 text-dark"></i></a>
                <a :href="'https://wa.me/' + brandConfig.whatsappNumber" target="_blank"><i data-lucide="message-circle" class="w-6 h-6 text-green-500"></i></a>
                <a :href="brandConfig.social.facebook" target="_blank"><i data-lucide="facebook" class="w-6 h-6 text-blue-600"></i></a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="relative min-h-screen flex items-center justify-center bg-black overflow-hidden">
        <!-- Replicating Original Hero Video -->
        <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover opacity-60">
            <source src="https://www.pexels.com/download/video/3125907.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>
        <div class="relative z-10 max-w-7xl mx-auto px-4 text-center text-white pt-20">
            <h1 class="text-6xl sm:text-8xl lg:text-9xl font-bold leading-none mb-8 font-bebas tracking-tighter"><span class="block">WEAR THE</span><span class="text-primary block">STREAK.</span></h1>
            <p class="text-xl sm:text-2xl text-white/80 max-w-2xl mx-auto mb-12" x-text="brandConfig.slogan[language]"></p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="shop.html" class="btn-yellow h-16 px-12 text-lg" x-text="brandConfig.ui.explore[language]"></a>
                <a href="about.html" class="btn-white h-16 px-12 text-lg" x-text="brandConfig.ui.mission_btn[language]"></a>
            </div>
        </div>
    </section>

    <!-- Fan Favorites -->
    <section class="py-24 bg-white relative z-10">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-end justify-between mb-12">
                <div><span class="text-primary font-bold tracking-widest text-sm uppercase mb-4 block" x-text="brandConfig.ui.best_sellers[language]"></span><h2 class="text-4xl lg:text-5xl font-bold text-dark" x-text="language === 'ar' ? 'المفضلات' : 'Fan Favorites'"></h2></div>
                <a href="shop.html" class="text-dark font-bold border-b-2 border-primary pb-1 flex items-center gap-2 group transition-all hover:text-primary"><span x-text="language === 'ar' ? 'عرض الكل' : 'View All'"></span> <i data-lucide="chevron-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i></a>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <template x-for="product in products.slice(0, 4)" :key="product.id">
                    <a href="shop.html" class="group">
                        <div class="relative aspect-[4/5] overflow-hidden rounded-[2.5rem] bg-gray-50 mb-6 group-hover:shadow-2xl transition-all duration-500">
                            <img :src="product.image" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute top-4 left-4 px-3 py-1 bg-primary text-black text-[10px] font-bold rounded-full uppercase shadow-lg" x-text="product.badge"></div>
                        </div>
                        <h3 class="font-bold text-xl mb-1 text-dark group-hover:text-primary transition-colors" x-text="language === 'ar' ? product.nameAr : product.name"></h3>
                        <p class="text-primary font-bebas text-2xl tracking-wider" x-text="product.priceLabel"></p>
                    </a>
                </template>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#1a1a1a] text-white pt-24 pb-12 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-20"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-12 mb-20">
                <div class="col-span-2 md:col-span-4 lg:col-span-2">
                    <div class="bg-white rounded-xl p-3 inline-block mb-6 shadow-lg">
                        <img src="logo.png" class="h-12 w-auto object-contain">
                    </div>
                    <p class="text-white/60 text-sm mb-8 max-w-xs leading-relaxed" x-text="brandConfig.mission[language]"></p>
                    <div class="space-y-4">
                        <a :href="'mailto:' + brandConfig.email" class="flex items-center gap-3 text-white/60 hover:text-primary transition-colors text-sm font-semibold"><i data-lucide="mail" class="w-4 h-4 text-primary"></i> <span x-text="brandConfig.email"></span></a>
                        <a :href="'https://wa.me/' + brandConfig.whatsappNumber" target="_blank" class="flex items-center gap-3 text-white/60 hover:text-primary transition-colors text-sm font-semibold"><i data-lucide="message-circle" class="w-4 h-4 text-green-500"></i> <span>WhatsApp Support</span></a>
                    </div>
                </div>
                <div>
                    <h4 class="text-white font-bold mb-6 uppercase tracking-widest text-xs text-primary" x-text="brandConfig.ui.shop[language]"></h4>
                    <ul class="space-y-4 text-white/40 text-sm font-semibold">
                        <li><a href="shop.html" class="hover:text-primary transition-colors" x-text="brandConfig.ui.all_products[language]"></a></li>
                        <li><a href="shop.html" class="hover:text-primary transition-colors" x-text="brandConfig.ui.best_sellers[language]"></a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-white font-bold mb-6 uppercase tracking-widest text-xs text-primary" x-text="language === 'ar' ? 'الشركة' : 'Company'"></h4>
                    <ul class="space-y-4 text-white/40 text-sm font-semibold">
                        <li><a href="about.html" class="hover:text-primary transition-colors" x-text="brandConfig.ui.about[language]"></a></li>
                        <li><a href="contact.html" class="hover:text-primary transition-colors" x-text="brandConfig.ui.contact[language]"></a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-white font-bold mb-6 uppercase tracking-widest text-xs text-primary" x-text="language === 'ar' ? 'الدعم' : 'Support'"></h4>
                    <ul class="space-y-4 text-white/40 text-sm font-semibold">
                        <li><a href="contact.html" class="hover:text-primary transition-colors">Shipping Info</a></li>
                        <li><a href="contact.html" class="hover:text-primary transition-colors">Returns</a></li>
                    </ul>
                </div>
            </div>
            <div class="border-t border-white/5 pt-10 flex flex-col md:flex-row justify-between items-center gap-8">
                <p class="text-white/20 text-[10px] uppercase tracking-widest font-bold">&copy; 2026 STREAK EGY. All rights reserved.</p>
                <div class="flex items-center gap-6">
                    <a :href="brandConfig.social.instagram" target="_blank" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-white/40 hover:bg-primary hover:text-black transition-all shadow-sm"><i data-lucide="instagram" class="w-5 h-5"></i></a>
                    <a :href="brandConfig.social.facebook" target="_blank" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-white/40 hover:bg-primary hover:text-black transition-all shadow-sm"><i data-lucide="facebook" class="w-5 h-5"></i></a>
                    <a :href="brandConfig.social.youtube" target="_blank" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-white/40 hover:bg-primary hover:text-black transition-all shadow-sm"><i data-lucide="youtube" class="w-5 h-5"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Cart Sidebar -->
    <div x-show="cartOpen" x-cloak class="fixed inset-0 z-[150]">
        <div @click="cartOpen = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="absolute inset-y-0 right-0 max-w-md w-full bg-white text-dark flex flex-col shadow-2xl">
            <div class="p-8 border-b flex items-center justify-between bg-[#1a1a1a] text-white">
                <h2 class="text-3xl font-bebas tracking-wider" x-text="brandConfig.ui.your_gear[language]"></h2>
                <button @click="cartOpen = false" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-primary transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-6">
                <template x-for="item in cart">
                    <div class="flex gap-4 p-4 bg-gray-50 rounded-2xl">
                        <img :src="item.image" class="w-20 h-24 object-cover rounded-xl">
                        <div class="flex-1">
                            <h3 class="font-bold" x-text="language === 'ar' ? item.nameAr : item.name"></h3>
                            <div class="flex items-center justify-between mt-4">
                                <span class="font-bold text-lg" x-text="'LE ' + (item.price * item.quantity).toLocaleString()"></span>
                                <div class="flex items-center gap-2">
                                    <button @click="updateQuantity(item, -1)" class="w-8 h-8 rounded-lg bg-white border flex items-center justify-center"><i data-lucide="minus" class="w-3 h-3"></i></button>
                                    <span class="font-bold text-sm" x-text="item.quantity"></span>
                                    <button @click="updateQuantity(item, 1)" class="w-8 h-8 rounded-lg bg-white border flex items-center justify-center"><i data-lucide="plus" class="w-3 h-3"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            <div class="p-8 border-t space-y-4">
                <div class="flex justify-between font-bold text-2xl"><span x-text="brandConfig.ui.total[language]"></span><span x-text="'LE ' + cartTotal.toLocaleString()"></span></div>
                <button @click="checkout()" class="w-full btn-yellow h-16 uppercase font-bebas tracking-widest text-xl shadow-xl" x-text="brandConfig.ui.checkout[language]"></button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function mainApp() {
            return {
                loading: true,
                scrolled: false,
                language: localStorage.getItem('lang') || 'en',
                cartOpen: false,
                mobileMenuOpen: false,
                cart: JSON.parse(localStorage.getItem('cart') || '[]'),
                brandConfig: brandConfig,
                products: products,
                init() {
                    setTimeout(() => { this.loading = false; this.updateLucide(); }, 2000);
                    window.addEventListener('scroll', () => { this.scrolled = window.scrollY > 50; });
                    this.$watch('cart', val => { localStorage.setItem('cart', JSON.stringify(val)); this.updateLucide(); });
                    this.$watch('language', () => { this.updateLucide(); });
                    this.$watch('mobileMenuOpen', () => { this.updateLucide(); });
                    this.updateLucide();
                },
                toggleLanguage() { this.language = this.language === 'en' ? 'ar' : 'en'; localStorage.setItem('lang', this.language); },
                get cartCount() { return this.cart.reduce((sum, item) => sum + item.quantity, 0); },
                get cartTotal() { return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0); },
                updateQuantity(item, delta) {
                    const found = this.cart.find(i => i.id === item.id && i.color === item.color && i.size === item.size);
                    if (found) { found.quantity += delta; if (found.quantity <= 0) this.cart = this.cart.filter(i => i !== found); }
                    this.updateLucide();
                },
                checkout() {
                    let msg = `Hi Streak egy! ⚡ I want to order:\n\n`;
                    this.cart.forEach(i => msg += `- ${this.language === 'ar' ? i.nameAr : i.name} (${i.color}, ${i.size}) x${i.quantity}\n`);
                    msg += `\nTotal: LE ${this.cartTotal.toLocaleString()}`;
                    window.open(`https://wa.me/201551137890?text=${encodeURIComponent(msg)}`, '_blank');
                },
                updateLucide() { 
                    this.$nextTick(() => { 
                        if (window.lucide) {
                            lucide.createIcons(); 
                        }
                    }); 
                }
            }
        }
    </script>
</body>
</html>
